<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pixel Tarot</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="bg"></div>

<div class="container">

  <h1 class="title">🎴 PIXEL TAROT</h1>

  <div class="form">
    <input id="birthday" placeholder="输入生日 YYYY-MM-DD">
    <select id="gender">
      <option value="m">男</option>
      <option value="f">女</option>
    </select>

    <button id="start">开始抽牌</button>
  </div>

  <div id="cards" class="cards"></div>

  <div id="ai" class="ai-box"></div>

</div>

<script src="app.js"></script>

</body>
</html>
